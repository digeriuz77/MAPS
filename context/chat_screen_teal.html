<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-1 Platform - Chat with Jan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #b2d8d8 0%, #66b2b2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        h1 {
            color: #004c4c;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8em;
            font-weight: 600;
        }

        .chat-container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0, 76, 76, 0.15);
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            max-height: 600px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .message-header {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .message.you .message-header {
            color: #008080;
        }

        .message.persona .message-header {
            color: #006666;
        }

        .message-content {
            background: #f0f9f9;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.6;
            color: #004c4c;
            box-shadow: 0 2px 8px rgba(0, 128, 128, 0.08);
        }

        .message.you .message-content {
            background: linear-gradient(135deg, #e6f5f5 0%, #d9f0f0 100%);
            border: 2px solid #b2d8d8;
        }

        .message.persona .message-content {
            background: white;
            border: 2px solid #66b2b2;
        }

        .input-area {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #messageInput {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #004c4c;
            border-radius: 12px;
            font-size: 1em;
            font-family: inherit;
            resize: none;
            min-height: 60px;
            box-shadow: 0 4px 12px rgba(0, 76, 76, 0.1);
            transition: all 0.3s ease;
        }

        #messageInput:focus {
            outline: none;
            border-color: #008080;
            box-shadow: 0 6px 16px rgba(0, 128, 128, 0.2);
        }

        .send-button {
            background: #008080;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 128, 128, 0.3);
            font-weight: 600;
            white-space: nowrap;
        }

        .send-button:hover:not(:disabled) {
            background: #006666;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 128, 128, 0.4);
        }

        .send-button:disabled {
            background: #66b2b2;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .finish-button {
            background: #004c4c;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 76, 76, 0.3);
            margin-bottom: 20px;
            align-self: center;
        }

        .finish-button:hover {
            background: #006666;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 76, 76, 0.4);
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .footer button {
            background: #008080;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 128, 128, 0.3);
        }

        .footer button:hover {
            background: #006666;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 128, 128, 0.4);
        }

        .copyright {
            color: #004c4c;
            font-size: 0.85em;
        }

        /* Scrollbar styling */
        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: #e6f5f5;
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #66b2b2;
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #008080;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.4em;
                margin-bottom: 20px;
            }

            .chat-container {
                padding: 20px;
                max-height: 500px;
            }

            .input-area {
                flex-direction: column;
                gap: 10px;
            }

            .send-button {
                width: 100%;
                padding: 15px;
            }

            #messageInput {
                min-height: 50px;
            }

            .footer {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chat with Jan</h1>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message you">
                    <div class="message-header">You</div>
                    <div class="message-content">Hi, Jan, nice to see you</div>
                </div>

                <div class="message persona">
                    <div class="message-header">Jan</div>
                    <div class="message-content">And nice to see you too</div>
                </div>

                <div class="message you">
                    <div class="message-header">You</div>
                    <div class="message-content">How's it been going?</div>
                </div>

                <div class="message persona">
                    <div class="message-header">Jan</div>
                    <div class="message-content">Not bad</div>
                </div>

                <div class="message you">
                    <div class="message-header">You</div>
                    <div class="message-content">And what would make today's chat helpful?</div>
                </div>

                <div class="message persona">
                    <div class="message-header">Jan</div>
                    <div class="message-content">Well I've been a bit worried about my performance lately. I'm not sure what I'm doing wrong.</div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="Type your response here..."
                        rows="2"
                    ></textarea>
                </div>
                <button class="send-button" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <button class="finish-button" onclick="finishConversation()">Finish the conversation</button>

        <div class="footer">
            <button onclick="goBack()">Previous</button>
            <span class="copyright">©VHL 2025</span>
            <button onclick="goNext()">Next</button>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('messageInput');
        const messagesContainer = document.getElementById('messages');

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            // Add user message
            const userMessage = document.createElement('div');
            userMessage.className = 'message you';
            userMessage.innerHTML = `
                <div class="message-header">You</div>
                <div class="message-content">${text}</div>
            `;
            messagesContainer.appendChild(userMessage);

            // Clear input
            messageInput.value = '';

            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            // Simulate persona response after a delay
            setTimeout(() => {
                const personaMessage = document.createElement('div');
                personaMessage.className = 'message persona';
                personaMessage.innerHTML = `
                    <div class="message-header">Jan</div>
                    <div class="message-content">Thank you for listening. That helps me think about it differently.</div>
                `;
                messagesContainer.appendChild(personaMessage);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 1000);
        }

        // Allow Enter to send (Shift+Enter for new line)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function finishConversation() {
            console.log('Finishing conversation and moving to analysis');
            // Navigate to analysis screen
        }

        function goBack() {
            console.log('Going back to persona selection');
        }

        function goNext() {
            console.log('Skipping to next screen');
        }
    </script>
</body>
</html>
