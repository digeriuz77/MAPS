<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-1 Platform - Chat</title>
    <!-- Auth Blocker -->
    <script src="/static/js/auth-blocker.js"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #b2d8d8 0%, #66b2b2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 70px;
        }

        /* Navigation Bar */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #008080;
            padding: 15px 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        
        .nav-bar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        
        .nav-bar a:hover {
            opacity: 0.8;
        }
        
        .nav-bar a.active {
            border-bottom: 2px solid white;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        h1 {
            color: #004c4c;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8em;
            font-weight: 600;
        }

        .chat-container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0, 76, 76, 0.15);
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            max-height: 600px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .message-header {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .message.you .message-header {
            color: #008080;
        }

        .message.persona .message-header {
            color: #006666;
        }

        .message-content {
            background: #f0f9f9;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.6;
            color: #004c4c;
            box-shadow: 0 2px 8px rgba(0, 128, 128, 0.08);
        }

        .message.you .message-content {
            background: linear-gradient(135deg, #e6f5f5 0%, #d9f0f0 100%);
            border: 2px solid #b2d8d8;
        }

        .message.persona .message-content {
            background: white;
            border: 2px solid #66b2b2;
        }

        .input-area {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #messageInput {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #004c4c;
            border-radius: 12px;
            font-size: 1em;
            font-family: inherit;
            resize: none;
            min-height: 60px;
            box-shadow: 0 4px 12px rgba(0, 76, 76, 0.1);
            transition: all 0.3s ease;
        }

        #messageInput:focus {
            outline: none;
            border-color: #008080;
            box-shadow: 0 6px 16px rgba(0, 128, 128, 0.2);
        }

        .send-button {
            background: #008080;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 128, 128, 0.3);
            font-weight: 600;
            white-space: nowrap;
        }

        .send-button:hover:not(:disabled) {
            background: #006666;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 128, 128, 0.4);
        }

        .send-button:disabled {
            background: #66b2b2;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .finish-button {
            background: #004c4c;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 76, 76, 0.3);
            margin-bottom: 20px;
            align-self: center;
        }

        .finish-button:hover {
            background: #006666;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 76, 76, 0.4);
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .footer button {
            background: #008080;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 128, 128, 0.3);
        }

        .footer button:hover {
            background: #006666;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 128, 128, 0.4);
        }

        .copyright {
            color: #004c4c;
            font-size: 0.85em;
        }

        /* Scrollbar styling */
        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: #e6f5f5;
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #66b2b2;
            border-radius: 10px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #008080;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.4em;
                margin-bottom: 20px;
            }

            .chat-container {
                padding: 20px;
                max-height: 500px;
            }

            .input-area {
                flex-direction: column;
                gap: 10px;
            }

            .send-button {
                width: 100%;
                padding: 15px;
            }

            #messageInput {
                min-height: 50px;
            }

            .footer {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="nav-bar">
        <a href="/welcome"><i class="fas fa-sign-in-alt"></i> Welcome</a>
        <a href="/persona-select" class="active"><i class="fas fa-users"></i> Personas</a>
        <a href="/analysis"><i class="fas fa-chart-line"></i> Analysis</a>
        <a href="/reflection"><i class="fas fa-lightbulb"></i> Reflection</a>
        <a href="/feedback"><i class="fas fa-comment-dots"></i> Feedback</a>
    </nav>

    <div class="container">
        <h1 id="chatTitle">Chat</h1>

        <div class="chat-container">
            <div class="messages" id="messages">
                <!-- Messages will be added here dynamically -->
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="Type your response here..."
                        rows="2"
                        disabled
                    ></textarea>
                </div>
                <button class="send-button" id="sendButton" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>

        <button class="finish-button" id="downloadBtn" onclick="downloadConversation()" style="display: none; background: #006666; margin-bottom: 10px;"><i class="fas fa-download"></i> Download Transcript</button>
        <button class="finish-button" id="finishButton" onclick="finishConversation()" style="display: none;">Finish & View Analysis</button>

        <div class="footer">
            <button onclick="goBack()">Previous</button>
            <span class="copyright">©VHL 2025</span>
            <button onclick="goNext()" id="nextBtn">Next</button>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('messageInput');
        const messagesContainer = document.getElementById('messages');
        const sendButton = document.getElementById('sendButton');
        const finishButton = document.getElementById('finishButton');
        const chatTitle = document.getElementById('chatTitle');
        
        let currentPersona = null;
        let currentConversationId = null;
        let messageCount = 0;
        let conversationHistory = [];  // Store all messages for persistence and download

        // Store persona loading logic to run after auth is complete
        let pendingPersonaLoad = null;
        
        // Auto-load persona from URL or restore from sessionStorage
        document.addEventListener('DOMContentLoaded', function() {
            // Check URL for persona parameter first
            const urlParams = new URLSearchParams(window.location.search);
            const personaId = urlParams.get('persona');

            // Store the loading logic to run after auth
            pendingPersonaLoad = async function() {
                // Try to restore existing conversation from sessionStorage
                const savedConversation = sessionStorage.getItem('currentConversation');

                if (savedConversation) {
                    try {
                        const data = JSON.parse(savedConversation);

                        // CRITICAL FIX: Only restore if persona matches OR no new persona requested
                        if (!personaId || personaId === data.personaId) {
                            console.log('🔄 Restoring conversation from sessionStorage');
                            await restoreConversation(data);
                            console.log('✅ Conversation restored successfully');
                            return; // Don't start a new conversation
                        } else {
                            // Different persona requested - clear old conversation
                            console.log('🆕 Different persona requested, clearing old conversation');
                            sessionStorage.removeItem('currentConversation');
                        }
                    } catch (error) {
                        console.error('❌ Failed to restore conversation:', error);
                        sessionStorage.removeItem('currentConversation');
                    }
                }

                // Start new conversation if persona specified
                if (personaId) {
                    console.log('🆕 Starting new conversation with persona:', personaId);
                    await startConversation(personaId);
                }
            };
        });
        
        // Restore a conversation from saved data
        async function restoreConversation(data) {
            currentConversationId = data.conversationId;
            currentPersona = {
                id: data.personaId,
                name: data.personaName
            };
            conversationHistory = data.messages || [];
            
            // Update title
            chatTitle.textContent = `Chat with ${data.personaName}`;
            
            // Clear existing messages
            messagesContainer.innerHTML = '';
            
            // Restore all messages to the UI
            conversationHistory.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.role === 'user' ? 'you' : 'persona'}`;
                
                const header = document.createElement('div');
                header.className = 'message-header';
                header.textContent = msg.role === 'user' ? 'You' : data.personaName;
                
                const content = document.createElement('div');
                content.className = 'message-content';
                content.textContent = msg.content;
                
                messageDiv.appendChild(header);
                messageDiv.appendChild(content);
                messagesContainer.appendChild(messageDiv);
            });
            
            // Calculate message count (each pair of user+persona = 1 exchange)
            messageCount = Math.floor(conversationHistory.length / 2);
            
            // Enable input
            messageInput.disabled = false;
            sendButton.disabled = false;
            messageInput.placeholder = 'Continue the conversation...';
            
            // Show finish/download buttons if we have enough messages
            if (messageCount >= 3) {
                finishButton.style.display = 'block';
                document.getElementById('downloadBtn').style.display = 'block';
            }
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Focus input
            messageInput.focus();
        }

        // Note: Previously used getPreloadedConversation function removed
        // Now using random greetings from Supabase persona_greetings table

        async function startConversation(personaId) {
            try {
                // Clear any previous conversation from sessionStorage when starting new
                sessionStorage.removeItem('currentConversation');
                console.log('🧹 Cleared previous conversation data');
                
                // Reset conversation history
                conversationHistory = [];
                messagesContainer.innerHTML = '';
                
                // Start new conversation with API (STAGED SYSTEM)
                const response = await window.authenticatedFetch('/api/chat/start', {
                    method: 'POST',
                    body: JSON.stringify({ persona_id: personaId })
                });

                const data = await response.json();
                
                // Use conversation_id (UUID) as the identifier for all operations
                currentConversationId = data.conversation_id;
                currentPersona = { id: personaId, name: data.persona_name };
                
                console.log(`✅ Started conversation: conv_id=${data.conversation_id}`);

                // Update title
                chatTitle.textContent = `Chat with ${data.persona_name}`;

                // Add the random initial greeting from the persona
                if (data.initial_greeting) {
                    addMessage('persona', data.initial_greeting);
                    messageCount = 1; // One greeting message
                } else {
                    // Fallback if no greeting provided
                    addMessage('persona', `Hi there! It's good to connect with you today. How are things going?`);
                    messageCount = 1;
                }

                // Enable input immediately - user can start the conversation
                messageInput.disabled = false;
                sendButton.disabled = false;

                // Don't show finish button yet - need at least 3 exchanges
                finishButton.style.display = 'none';
                document.getElementById('downloadBtn').style.display = 'none';

                // Update placeholder
                messageInput.placeholder = 'How would you like to respond?';

                // Focus input
                messageInput.focus();

            } catch (error) {
                console.error('Failed to start conversation:', error);
                alert('Failed to start conversation. Please try again.');
            }
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentConversationId) return;

            // Add user message
            addMessage('you', text);

            // Clear input
            messageInput.value = '';

            // Disable input while waiting
            messageInput.disabled = true;
            sendButton.disabled = true;

            try {
                // Send message to API using STAGED SYSTEM structure
                const response = await window.authenticatedFetch('/api/chat/send', {
                    method: 'POST',
                    body: JSON.stringify({
                        session_id: currentConversationId,  // Staged system uses session_id
                        persona_id: currentPersona.id,  // Required for staged system
                        message: text,
                        conversation_history: conversationHistory,  // Provide full context
                        persona_llm: 'gpt-4o-mini'  // Stage 2 response model
                    })
                });

                const data = await response.json();

                // Add persona response
                addMessage('persona', data.response);

                // Increment message count
                messageCount++;

                // Show finish button after 3 messages
                if (messageCount >= 3) {
                    finishButton.style.display = 'block';
                    document.getElementById('downloadBtn').style.display = 'block';
                }

                // Re-enable input
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();

            } catch (error) {
                console.error('Failed to send message:', error);
                alert('Failed to send message. Please try again.');
                messageInput.disabled = false;
                sendButton.disabled = false;
            }
        }

        function addMessage(type, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const header = document.createElement('div');
            header.className = 'message-header';
            header.textContent = type === 'you' ? 'You' : (currentPersona ? currentPersona.name : 'Persona');
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            
            messageDiv.appendChild(header);
            messageDiv.appendChild(content);
            messagesContainer.appendChild(messageDiv);

            // Store in conversation history
            conversationHistory.push({
                role: type === 'you' ? 'user' : 'persona',
                content: text,
                timestamp: new Date().toISOString()
            });

            // Persist to sessionStorage
            if (currentConversationId) {
                sessionStorage.setItem('currentConversation', JSON.stringify({
                    conversationId: currentConversationId,
                    personaName: currentPersona?.name,
                    personaId: currentPersona?.id,
                    messages: conversationHistory
                }));
            }

            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Allow Enter to send (Shift+Enter for new line)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function finishConversation() {
            if (!currentConversationId) return;

            // CRITICAL: Ensure sessionStorage is saved before navigating
            // This allows user to click back button and continue conversation
            sessionStorage.setItem('currentConversation', JSON.stringify({
                conversationId: currentConversationId,
                personaName: currentPersona?.name,
                personaId: currentPersona?.id,
                messages: conversationHistory
            }));

            console.log('💾 Saved conversation to sessionStorage before finishing');

            // Auto-navigate to analysis page
            window.location.href = `/analysis?conversation_id=${currentConversationId}`;
        }

        function downloadConversation() {
            if (!conversationHistory || conversationHistory.length === 0) {
                alert('No conversation to download');
                return;
            }

            // Format as readable transcript
            const transcript = conversationHistory.map(msg => {
                const speaker = msg.role === 'user' ? 'Coach' : (currentPersona?.name || 'Persona');
                return `${speaker}: ${msg.content}`;
            }).join('\n\n');

            const header = `Conversation with ${currentPersona?.name || 'Persona'}
Date: ${new Date().toLocaleString()}
Conversation ID: ${currentConversationId}

---

`;

            const fullTranscript = header + transcript;

            // Create download
            const blob = new Blob([fullTranscript], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `conversation_${currentPersona?.name}_${new Date().toISOString().split('T')[0]}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function goBack() {
            window.location.href = '/persona-select';
        }

        function goNext() {
            if (currentConversationId) {
                window.location.href = `/analysis?conversation_id=${currentConversationId}`;
            }
        }
    </script>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Auth utilities -->
    <script src="/static/js/supabaseClient.js"></script>
    <script src="/static/js/authGuard.js"></script>
    <script src="/static/js/navigation.js"></script>
    
    <script>
        // Initialize auth - BLOCKS until verified
        (async function() {
            try {
                await initializeSupabase();
                await requireAuth();
                console.log('✅ Chat page protected by auth');
                window.authCheckComplete();
                
                // Now that auth is complete, execute pending persona load
                if (pendingPersonaLoad) {
                    await pendingPersonaLoad();
                    pendingPersonaLoad = null; // Clean up
                }
            } catch (error) {
                console.error('Auth failed:', error);
            }
        })();
    </script>
</body>
</html>
