<style>
    .unified-nav {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(30, 58, 138, 0.1);
        position: fixed;
        top: 0;

    .nav-container {
        max-width: 1400px;

    }

    .nav-brand {

    }

    }

    .brand-link:hover {
        color: #1E3A8A;
    }

    .brand-link i {
        font-size: 1.5rem;
        margin-right: 0.5rem;
        background: linear-gradient(135deg, #7C3AED 0%, #1E3A8A 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .nav-links {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .nav-link {
        display: flex;
        align-items: center;
        padding: 0.6rem 1.2rem;
        text-decoration: none;
        color: #475569;
        border-radius: 50px;

    }

    .nav-link:hover {
        background: rgba(236, 72, 153, 0.1);
        color: #EC4899;
    }

    .nav-link.active {
        background: linear-gradient(135deg, #7C3AED 0%, #1E3A8A 100%);
        color: white;
    }

    .theme-toggle-btn {
        background: transparent;
        border: 2px solid #1E3A8A;
        color: #1E3A8A;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .theme-toggle-btn:hover {
        background: #1E3A8A;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(30, 58, 138, 0.2);
    }

    /* Dark mode styles */
    [data-theme="dark"] .unified-nav {
        background: rgba(30, 41, 59, 0.98);
        border-bottom-color: rgba(124, 58, 237, 0.3);
    }

    [data-theme="dark"] .brand-link,

    /* Responsive */

        .brand-text {

        .nav-link span {

            font-size: 1.2rem;

</style>

<script>
    // Navigation active state management
    document.addEventListener('DOMContentLoaded', () => {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.nav-link');

        navLinks.forEach(link => {
            const linkPath = link.getAttribute('href');
            // Handle both exact matches and partial matches for nested pages
            if (currentPath === linkPath ||
                (linkPath !== '/welcome' && currentPath.startsWith(linkPath.replace('.html', '')))) {
                link.classList.add('active');
            }
        });
    });
</script>
