<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - 1-1 Practice Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/teal-theme.css">
    <style>
        body {
            padding-top: 70px;
            /* Space for fixed nav */
        }

        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #7C3AED 0%, #1E3A8A 100%);
            padding: 15px 30px;
            box-shadow: 0 2px 8px rgba(30, 58, 138, 0.2);
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .nav-bar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .nav-bar a:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body class="teal-theme">
    <!-- Navigation Bar -->
    <nav class="nav-bar">
        <a href="/welcome"><i class="fas fa-sign-in-alt"></i> Welcome</a>
        <a href="/"><i class="fas fa-comments"></i> Practice</a>
        <a href="/analysis"><i class="fas fa-chart-line"></i> Analysis</a>
        <a href="/reflection"><i class="fas fa-lightbulb"></i> Reflection</a>
        <a href="/feedback"><i class="fas fa-comment-dots"></i> Feedback</a>
    </nav>
    <div class="thankyou-container">
        <div class="teal-card">
            <i class="fas fa-check-circle success-icon"></i>
            <h1>Thank You!</h1>
            <p class="thankyou-message">
                Thank you so much for taking the time to practice on the platform today.
                Please feel free to come back and practice any time.
            </p>
            <button class="btn-teal-primary" onclick="location.href='/auth'">
                <i class="fas fa-home"></i> Leave
            </button>
        </div>
    </div>

    <footer class="vhl-footer">
        <button class="btn-teal-secondary" onclick="location.href='/feedback'">Previous</button>
        <span class="copyright">©VHL 2025</span>
        <span></span> <!-- Empty for alignment -->
    </footer>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Auth utilities -->
    <script src="/static/js/supabaseClient.js"></script>
    <script src="/static/js/authGuard.js"></script>
    <script src="/static/js/navigation.js"></script>

    <script>
        // Initialize auth - BLOCKS until verified
        (async function () {
            try {
                await initializeSupabase();
                await requireAuth();
                console.log('✅ Thank you page protected by auth');
                window.authCheckComplete();
            } catch (error) {
                console.error('Auth failed:', error);
            }
        })();
    </script>
</body>

</html>
