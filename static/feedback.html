<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - 1-1 Practice Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/teal-theme.css">
    <style>
        body {
            padding-top: 70px; /* Space for fixed nav */
        }
        
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--primary-teal);
            padding: 15px 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        
        .nav-bar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        
        .nav-bar a:hover {
            opacity: 0.8;
        }
        
        .nav-bar a.active {
            border-bottom: 2px solid white;
        }
    </style>
</head>
<body class="teal-theme">
    <!-- Navigation Bar -->
    <nav class="nav-bar">
        <a href="/welcome"><i class="fas fa-sign-in-alt"></i> Welcome</a>
        <a href="/persona-select"><i class="fas fa-users"></i> Personas</a>
        <a href="/analysis"><i class="fas fa-chart-line"></i> Analysis</a>
        <a href="/reflection"><i class="fas fa-lightbulb"></i> Reflection</a>
        <a href="/feedback" class="active"><i class="fas fa-comment-dots"></i> Feedback</a>
    </nav>
    <div class="feedback-container">
        <h1>Your Feedback</h1>
        <p class="subtitle">Help us improve your practice experience</p>
        
        <div class="teal-card">
            <label class="question-label">What did you find helpful?</label>
            <textarea id="whatHelpful" class="teal-input" rows="5" 
                      placeholder="Share what aspects were most valuable..."></textarea>
        </div>
        
        <div class="teal-card">
            <label class="question-label">What can we do to improve?</label>
            <textarea id="improvements" class="teal-input" rows="5"
                      placeholder="Your suggestions for improvement..."></textarea>
        </div>
        
        <button id="submitFeedback" class="btn-teal-primary">
            Submit Feedback
        </button>
    </div>
    
    <footer class="vhl-footer">
        <button class="btn-teal-secondary" onclick="location.href='/reflection'">Previous</button>
        <span class="copyright">©VHL 2025</span>
        <button class="btn-teal-secondary" id="nextBtn" disabled>Next</button>
    </footer>
    
    <script src="/static/js/feedback.js"></script>
</body>
</html>
