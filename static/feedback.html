<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - 1-1 Practice Platform</title>
    <!-- Auth Blocker -->
    <script src="/static/js/auth-blocker.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/teal-theme.css">
    <style>
        body {
            padding-top: 70px; /* Space for fixed nav */
        }
        
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--primary-teal);
            padding: 15px 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        
        .nav-bar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        
        .nav-bar a:hover {
            opacity: 0.8;
        }
        
        .nav-bar a.active {
            border-bottom: 2px solid white;
        }
    </style>
</head>
<body class="teal-theme">
    <!-- Navigation Bar -->
    <nav class="nav-bar">
        <a href="/welcome"><i class="fas fa-sign-in-alt"></i> Welcome</a>
        <a href="/persona-select"><i class="fas fa-users"></i> Personas</a>
        <a href="/analysis"><i class="fas fa-chart-line"></i> Analysis</a>
        <a href="/reflection"><i class="fas fa-lightbulb"></i> Reflection</a>
        <a href="/feedback" class="active"><i class="fas fa-comment-dots"></i> Feedback</a>
    </nav>
    <div class="feedback-container">
        <h1>Your Feedback</h1>
        <p class="subtitle">Help us improve your practice experience</p>
        
        <div class="teal-card">
            <label class="question-label">
                If 0 = not at all and 10 = very, how helpful did you find today's session
            </label>
            <div class="rating-display">
                <span id="ratingValue" class="rating-number">5</span>
                <input type="range" id="helpfulness" class="teal-slider" 
                       min="0" max="10" value="5" step="1">
                <div class="rating-labels">
                    <span>0 - Not at all</span>
                    <span>10 - Very helpful</span>
                </div>
            </div>
        </div>
        
        <div id="helpfulSection" class="teal-card" style="display:none;">
            <label class="question-label">If you scored more than 1, what did you find helpful?</label>
            <textarea id="whatHelpful" class="teal-input" rows="5" 
                      placeholder="Share what aspects were most valuable..."></textarea>
        </div>
        
        <div class="teal-card">
            <label class="question-label">What changes could we make to make it more helpful to you in the future?</label>
            <textarea id="improvements" class="teal-input" rows="5"
                      placeholder="Your suggestions for improvement..."></textarea>
        </div>
        
        <button id="submitFeedback" class="btn-teal-primary">
            Submit Feedback
        </button>
    </div>
    
    <footer class="vhl-footer">
        <button class="btn-teal-secondary" onclick="location.href='/reflection'">Previous</button>
        <span class="copyright">©VHL 2025</span>
        <button class="btn-teal-secondary" id="nextBtn" disabled>Next</button>
    </footer>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Auth utilities -->
    <script src="/static/js/supabaseClient.js"></script>
    <script src="/static/js/authGuard.js"></script>
    <script src="/static/js/navigation.js"></script>
    
    <script src="/static/js/feedback.js"></script>
    
    <script>
        // Wait for Supabase initialization from navigation.js to complete
        // navigation.js already calls initializeSupabase
        window.addEventListener('DOMContentLoaded', async function() {
            // Verify FULL access required for feedback
            try {
                await requireFullAccess();
                console.log('✅ Feedback page - FULL access verified');
                if (typeof window.authCheckComplete === 'function') {
                    window.authCheckComplete();
                }
            } catch (error) {
                console.error('FULL access check failed:', error);
                // requireFullAccess already handles redirect
            }
        });
    </script>
</body>
</html>
